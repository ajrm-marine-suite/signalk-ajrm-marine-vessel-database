<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AJRM Marine Vessel Database</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AJRM Marine Vessel Database</h1>
          <p id="summary">Loading</p>
        </div>
        <div class="actions">
          <input id="filter" type="search" placeholder="Filter vessels" />
          <button id="refresh" type="button">Refresh</button>
          <button id="deleteAll" type="button" class="danger">Delete all</button>
        </div>
      </header>
      <p id="status" role="status"></p>
      <section id="details" class="details-panel" hidden>
        <div class="details-header">
          <div>
            <h2 id="detailsName">Vessel details</h2>
            <p id="detailsSubtitle"></p>
          </div>
          <button id="closeDetails" type="button" aria-label="Close details">Close</button>
        </div>
        <dl id="detailsList"></dl>
      </section>
      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>MMSI</th>
              <th>Callsign</th>
              <th>Type</th>
              <th>Class</th>
              <th>Length</th>
              <th>Beam</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="vessels"></tbody>
        </table>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
